{% extends "base.html" %}

{% block content %}
<div class="row mb-5">
    <div class="col-12">
        <h2 class="text-primary border-bottom border-secondary pb-2"><i class="fa-solid fa-magnifying-glass me-2"></i> Búsqueda de Expedientes Criminales en Serie: CRIMEN CAPITAL [Ciudad de Córdoba y campaña] (1664-1894)</h2>
        <div class="card bg-dark border-secondary shadow mt-4">
            <div class="card-body p-4 bg-darker">
                <form id="form-busqueda">
                    <div class="row g-4">
                        <div class="col-md-6">
                            <label class="form-label text-light fw-bold">Actor / Imputado / Partes</label>
                            <input type="text" class="form-control bg-dark text-light border-secondary" id="apellido" name="apellido" placeholder="Ej: Juan Perez">
                        </div>
                        <div class="col-md-3">
                            <label class="form-label text-light fw-bold">Año Desde</label>
                            <input type="number" class="form-control bg-dark text-light border-secondary" id="año_desde" name="año_desde" placeholder="Ej: 1664">
                        </div>
                        <div class="col-md-3">
                            <label class="form-label text-light fw-bold">Año Hasta</label>
                            <input type="number" class="form-control bg-dark text-light border-secondary" id="año_hasta" name="año_hasta" placeholder="Ej: 1894">
                        </div>
                        <div class="col-12">
                            <label class="form-label text-light fw-bold">Búsqueda libre en Carátula/Causa</label>
                            <input type="text" class="form-control bg-dark text-light border-secondary" id="texto_libre" name="texto_libre" placeholder="Palabras clave en la causa...">
                        </div>
                    </div>
                    <div class="mt-4 text-center">
                        <button type="submit" class="btn btn-primary btn-lg px-5 rounded-pill shadow">
                            <i class="fa-solid fa-search me-2"></i> Buscar
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<div id="loading" class="text-center d-none my-5">
    <div class="spinner-border text-primary" role="status"></div>
    <h5 class="mt-3 text-secondary">Buscando...</h5>
</div>

<div id="resultados-container" class="d-none">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h4 class="text-primary mb-0">Resultados (<span id="total-resultados">0</span>)</h4>
        <button id="btn-exportar-pdf" class="btn btn-outline-danger shadow-sm">
            <i class="fa-solid fa-file-pdf me-2"></i> Exportar a PDF
        </button>
    </div>
    <div class="card bg-darker border-secondary shadow mb-5">
        <table class="table table-dark table-striped mb-0" id="tabla-resultados">
            <thead>
                <tr>
                    <th class="text-primary">Año</th>
                    <th class="text-primary">Partes</th>
                    <th class="text-primary">Causa</th>
                    <th class="text-primary">Legajo / Exp.</th>
                    <th class="text-primary text-center">Acción</th>
                </tr>
            </thead>
            <tbody id="tbody-resultados"></tbody>
        </table>
    </div>
</div>

<div id="no-resultados" class="text-center d-none my-5 bg-darker p-5 rounded">
    <h4 class="text-secondary">No se encontraron expedientes</h4>
</div>
{% endblock %}

{% block scripts %}
<script>
$(document).ready(function() {
    $('#form-busqueda').on('submit', function(e) {
        e.preventDefault();
        
        let hasFilter = false;
        $('#form-busqueda input').each(function() {
            if ($(this).val().trim() !== '') hasFilter = true;
        });
        
        if (!hasFilter) {
            Swal.fire({ title: 'Atención', text: 'Ingrese al menos un criterio.', icon: 'warning', background: '#212529', color: '#fff' });
            return;
        }
        
        $('#resultados-container, #no-resultados').addClass('d-none');
        $('#loading').removeClass('d-none');
        
        $.ajax({
            url: '/api/buscar',
            data: $(this).serialize(),
            success: function(response) {
                $('#loading').addClass('d-none');
                if (response.total > 0) {
                    $('#total-resultados').text(response.total);
                    $('#tbody-resultados').empty();
                    response.registros.forEach(r => {
                        const tr = `
                            <tr>
                                <td>${r.año}</td>
                                <td>${r.apellido}</td>
                                <td>${r.caratula}</td>
                                <td>Leg: ${r.fojas} <br> Exp: ${r.signatura}</td>
                                <td class="text-center"><a href="/detalle/${r.id}" class="btn btn-sm btn-info">Ver</a></td>
                            </tr>
                        `;
                        $('#tbody-resultados').append(tr);
                    });
                    $('#resultados-container').removeClass('d-none');
                } else {
                    $('#no-resultados').removeClass('d-none');
                }
            }
        });
    });

    $('#btn-exportar-pdf').on('click', function() {
        const params = $('#form-busqueda').serialize();
        window.open('/api/exportar-pdf?' + params, '_blank');
    });
});
</script>
{% endblock %}
