<!DOCTYPE html>
<html lang="es" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AHPC - Escribanía de Crimen Capital</title>
    <!-- Bootstrap CSS (tema oscuro por defecto en 5.3) -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome para iconos -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <!-- SweetAlert2 para notificaciones -->
    <link href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css" rel="stylesheet">
    <!-- CSS personalizado -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    {% block head %}{% endblock %}
</head>
<body class="bg-dark text-light">
    
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-black py-3 border-bottom border-secondary shadow-sm">
        <div class="container">
            <a class="navbar-brand text-light fw-bold fs-6" href="/">
                <i class="fa-solid fa-book-journal-whills text-primary me-2"></i> AHPC - Archivo Histórico de la Provincia de Córdoba
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link {% if request.path == '/' %}active fw-bold text-primary{% endif %}" href="/">
                            <i class="fa-solid fa-house me-1"></i> Inicio
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if request.path == '/buscar' %}active fw-bold text-primary{% endif %}" href="/buscar">
                            <i class="fa-solid fa-magnifying-glass me-1"></i> Buscar
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if request.path == '/estadisticas' %}active fw-bold text-primary{% endif %}" href="/estadisticas">
                            <i class="fa-solid fa-chart-pie me-1"></i> Estadísticas
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Contenido principal -->
    <main class="container mb-5 pb-4">
        {% block content %}{% endblock %}
    </main>

    <!-- Footer -->
    <footer class="bg-black text-center text-muted py-4 border-top border-secondary mt-auto">
        <div class="container">
            <p class="mb-1">Archivo Histórico de la Provincia de Córdoba</p>
            <p class="mb-0"><small>Sistema de Consulta - Índice de Crimen Capital - 2026</small></p>
        </div>
    </footer>

    <!-- Bootstrap JS Bundle con Popper -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <!-- SweetAlert2 -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <!-- JS personalizado -->
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
    
    {% block scripts %}{% endblock %}
</body>
</html>
